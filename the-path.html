<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Path — Durim Morina</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0D1B2A;
      --surface:    #162436;
      --mid:        #2A3F55;
      --text:       #E8E0D5;
      --text-muted: #8A9BAD;
      --seafoam:    #7BBFB5;
      --gold:       #C9A96E;
      --gold-glow:  rgba(201,169,110,0.15);
      --ripple:     rgba(123,191,181,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 64px 24px 32px;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--seafoam);
      margin-bottom: 16px;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 6vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    header h1 em { font-style: italic; color: var(--gold); }
    header p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto;
    }

    /* ── OVERALL STATS ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      max-width: 420px;
      margin: 40px auto 56px;
      padding: 20px 0;
      border-top: 1px solid var(--mid);
      border-bottom: 1px solid var(--mid);
    }
    .stat { text-align: center; }
    .stat-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }
    .stat-l {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── NAV TABS ── */
    .tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px;
      margin-bottom: 48px;
    }
    .tab {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--mid);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .tab:hover { border-color: var(--seafoam); color: var(--seafoam); }
    .tab.active { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

    /* ── OVERVIEW GRID ── */
    #overview {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .category-card {
      background: var(--surface);
      border: 1px solid var(--mid);
      border-radius: 12px;
      padding: 24px 20px;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.18s;
    }
    .category-card:hover {
      border-color: var(--seafoam);
      transform: translateY(-2px);
    }
    .card-icon { font-size: 28px; margin-bottom: 12px; }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 10px;
    }
    .card-level {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .progress-bar {
      height: 3px;
      background: var(--mid);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--seafoam), var(--gold));
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .card-count {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── CATEGORY VIEW ── */
    #category-view {
      display: none;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .cat-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .cat-header .cat-icon { font-size: 36px; margin-bottom: 12px; }
    .cat-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .cat-header .level-badge {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      background: var(--gold-glow);
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 16px;
    }
    .cat-progress-bar {
      height: 4px;
      background: var(--mid);
      border-radius: 2px;
      overflow: hidden;
      max-width: 240px;
      margin: 0 auto 8px;
    }
    .cat-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--seafoam), var(--gold));
      border-radius: 2px;
    }
    .cat-count { font-size: 12px; color: var(--text-muted); }

    /* ── STONES (path) ── */
    .path {
      position: relative;
      padding-bottom: 40px;
    }
    .path::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--mid) 8%, var(--mid) 92%, transparent);
      transform: translateX(-50%);
    }
    .stone-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 44px;
      position: relative;
    }
    .stone-row:nth-child(odd)  { flex-direction: row; }
    .stone-row:nth-child(even) { flex-direction: row-reverse; }
    .stone-row::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 24px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--mid);
      transform: translateX(-50%);
      z-index: 1;
    }
    .stone-row.is-done::before { background: var(--gold); }

    .stone-icon {
      flex: 0 0 48px;
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      z-index: 2;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .stone-row:hover .stone-icon { transform: scale(1.1); }
    .stone-icon.done {
      background: var(--gold-glow);
      border: 1.5px solid var(--gold);
      box-shadow: 0 0 0 7px rgba(201,169,110,0.06), 0 0 20px rgba(201,169,110,0.12);
    }
    .stone-icon.pending {
      background: var(--ripple);
      border: 1.5px dashed var(--mid);
      opacity: 0.5;
    }

    .stone-body {
      flex: 1;
      padding: 6px 18px;
    }
    .stone-row:nth-child(odd)  .stone-body { text-align: left; }
    .stone-row:nth-child(even) .stone-body { text-align: right; }

    .stone-date {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .stone-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .stone-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      font-style: italic;
    }
    .stone-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
      margin-top: 7px;
    }
    .stone-tag.done  { color: var(--gold);    background: rgba(201,169,110,0.08); }
    .stone-tag.pend  { color: var(--seafoam); background: rgba(123,191,181,0.08); }

    /* ── HORIZON ── */
    .horizon {
      text-align: center;
      padding-top: 8px;
      position: relative;
      z-index: 2;
    }
    .horizon-circle {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px dashed var(--mid);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      color: var(--mid);
      font-size: 20px;
    }
    .horizon p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--text-muted);
    }

    /* ── LOADING / ERROR ── */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    .loading .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--mid);
      border-top-color: var(--seafoam);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .path::before { left: 26px; }
      .stone-row,
      .stone-row:nth-child(even) { flex-direction: row !important; }
      .stone-row::before { left: 26px; }
      .stone-body,
      .stone-row:nth-child(even) .stone-body { text-align: left !important; }
      #overview { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      .stone-icon, .category-card { transition: none; }
      .spinner { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Durim Morina</p>
  <h1>The <em>path</em><br>so far</h1>
  <p>Every stone crossed is real. Every stone ahead is already yours.</p>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="loading"><div class="spinner"></div>Loading your path...</div>
</div>

<div class="tabs" id="tabs" style="display:none"></div>

<div id="overview"></div>
<div id="category-view"></div>

<script>
/* ── CONFIG ── */
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQD5D0vdAu6Ka9qWJ-ErcGzcBb-5_HL6asF48cTPTTMcDAcLu2bs3vebiYGdDfDGTt0iylV9B6N6_4i/pub?output=csv";

const CATEGORY_META = {
  "Business & Money":       { icon: "💶", color: "#C9A96E" },
  "Facilitation":           { icon: "🌬️", color: "#7BBFB5" },
  "Presence & Visibility":  { icon: "🌐", color: "#A89CC8" },
  "Personal Growth":        { icon: "🌱", color: "#8FC99A" },
  "The Big Vision":         { icon: "✦",  color: "#E8A0A0" },
};

function levelFor(done, total) {
  const pct = total === 0 ? 0 : done / total;
  if (pct === 0)    return "Level 0 — not yet started";
  if (pct < 0.34)   return "Level 1 — beginning";
  if (pct < 0.67)   return "Level 2 — in motion";
  if (pct < 1)      return "Level 3 — almost there";
  return "Level 4 — complete";
}

/* ── CSV PARSER ── */
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/"/g, ""));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || "").trim());
    return obj;
  }).filter(r => r.category && r.title);
}

/* ── GROUP BY CATEGORY ── */
function groupBy(rows) {
  const map = {};
  rows.forEach(r => {
    const cat = r.category || "Other";
    if (!map[cat]) map[cat] = [];
    map[cat].push(r);
  });
  return map;
}

/* ── RENDER OVERVIEW ── */
function renderOverview(grouped) {
  const el = document.getElementById('overview');
  el.innerHTML = '';
  Object.entries(grouped).forEach(([cat, rows]) => {
    const meta  = CATEGORY_META[cat] || { icon: "◎", color: "#7BBFB5" };
    const done  = rows.filter(r => r.done && r.done.toLowerCase() === 'true').length;
    const total = rows.length;
    const pct   = total === 0 ? 0 : Math.round((done / total) * 100);
    const level = levelFor(done, total);

    const card = document.createElement('div');
    card.className = 'category-card';
    card.innerHTML = `
      <div class="card-icon">${meta.icon}</div>
      <div class="card-name">${cat}</div>
      <div class="card-level">${level}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="card-count">${done} of ${total} crossed</div>
    `;
    card.addEventListener('click', () => showCategory(cat, rows, grouped));
    el.appendChild(card);
  });
}

/* ── RENDER CATEGORY VIEW ── */
function showCategory(name, rows, grouped) {
  const meta  = CATEGORY_META[name] || { icon: "◎" };
  const done  = rows.filter(r => r.done && r.done.toLowerCase() === 'true').length;
  const total = rows.length;
  const pct   = total === 0 ? 0 : Math.round((done / total) * 100);
  const level = levelFor(done, total);

  document.getElementById('overview').style.display = 'none';
  const cv = document.getElementById('category-view');
  cv.style.display = 'block';

  /* activate tab */
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === name);
  });

  let stonesHTML = '';
  rows.forEach(r => {
    const isDone = r.done && r.done.toLowerCase() === 'true';
    stonesHTML += `
      <div class="stone-row ${isDone ? 'is-done' : ''}">
        <div class="stone-icon ${isDone ? 'done' : 'pending'}">${r.icon || (isDone ? '✓' : '○')}</div>
        <div class="stone-body">
          ${r.date ? `<div class="stone-date">${r.date}</div>` : ''}
          <div class="stone-title">${r.title}</div>
          ${r.note ? `<div class="stone-note">${r.note}</div>` : ''}
          ${r.tag  ? `<span class="stone-tag ${isDone ? 'done' : 'pend'}">${r.tag}</span>` : ''}
        </div>
      </div>
    `;
  });

  cv.innerHTML = `
    <div class="cat-header">
      <div class="cat-icon">${meta.icon}</div>
      <h2>${name}</h2>
      <div class="level-badge">${level}</div>
      <div class="cat-progress-bar"><div class="cat-progress-fill" style="width:${pct}%"></div></div>
      <div class="cat-count">${done} of ${total} crossed</div>
    </div>
    <div class="path">
      ${stonesHTML}
      <div class="horizon">
        <div class="horizon-circle">✦</div>
        <p>and wherever this path leads next</p>
      </div>
    </div>
  `;
}

/* ── TABS ── */
function renderTabs(grouped) {
  const tabsEl = document.getElementById('tabs');
  tabsEl.style.display = 'flex';
  tabsEl.innerHTML = '';

  const overview = document.createElement('button');
  overview.className = 'tab active';
  overview.dataset.cat = '__overview';
  overview.textContent = 'Overview';
  overview.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    overview.classList.add('active');
    document.getElementById('category-view').style.display = 'none';
    document.getElementById('overview').style.display = 'grid';
  });
  tabsEl.appendChild(overview);

  Object.keys(grouped).forEach(cat => {
    const tab = document.createElement('button');
    tab.className = 'tab';
    tab.dataset.cat = cat;
    const meta = CATEGORY_META[cat] || { icon: "◎" };
    tab.textContent = meta.icon + ' ' + cat;
    tab.addEventListener('click', () => showCategory(cat, grouped[cat], grouped));
    tabsEl.appendChild(tab);
  });
}

/* ── STATS BAR ── */
function renderStats(rows) {
  const done  = rows.filter(r => r.done && r.done.toLowerCase() === 'true').length;
  const total = rows.length;
  const pct   = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-n">${done}</div><div class="stat-l">crossed</div></div>
    <div class="stat"><div class="stat-n">${total - done}</div><div class="stat-l">ahead</div></div>
    <div class="stat"><div class="stat-n">${pct}%</div><div class="stat-l">of this map</div></div>
  `;
}

/* ── FETCH & BOOT ── */
async function load() {
  try {
    const res = await fetch(SHEET_CSV);
    if (!res.ok) throw new Error('Could not reach your sheet.');
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length === 0) throw new Error('Sheet looks empty. Add some milestones and refresh.');
    const grouped = groupBy(rows);
    renderStats(rows);
    renderTabs(grouped);
    renderOverview(grouped);
  } catch (err) {
    document.getElementById('stats-bar').innerHTML = '';
    document.getElementById('overview').innerHTML = `
      <div class="loading" style="grid-column:1/-1">
        Could not load your milestones.<br><br>
        <small>${err.message}<br><br>Make sure your Google Sheet is published to the web as CSV.</small>
      </div>`;
  }
}

load();
</script>
</body>
</html>
