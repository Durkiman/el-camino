<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Camino — Durim Morina</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #0D1B2A;
      --surface:      #162436;
      --mid:          #2A3F55;
      --text:         #E8E0D5;
      --text-muted:   #8A9BAD;
      --seafoam:      #7BBFB5;
      --gold:         #C9A96E;
      --gold-glow:    rgba(201,169,110,0.15);
      --ripple:       rgba(123,191,181,0.07);
      --horizon-col:  #A89CC8;
      --beyond-col:   #E8A0A0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 64px 24px 32px;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--seafoam);
      margin-bottom: 16px;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 6vw, 4rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 14px;
    }
    header h1 em { font-style: italic; color: var(--gold); }
    header p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 360px;
      margin: 0 auto;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      max-width: 480px;
      margin: 40px auto 56px;
      padding: 20px 0;
      border-top: 1px solid var(--mid);
      border-bottom: 1px solid var(--mid);
    }
    .stat { text-align: center; }
    .stat-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }
    .stat-l {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── LOADING ── */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--mid);
      border-top-color: var(--seafoam);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ZONES ── */
    .zones {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px 100px;
    }

    .zone-block {
      margin-bottom: 72px;
    }

    .zone-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--mid);
    }
    .zone-pip {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .zone-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      flex: 1;
    }
    .zone-label em { font-style: italic; }
    .zone-count {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* zone colour accents */
    .zone-crossed   .zone-pip { background: var(--gold); }
    .zone-inmotion  .zone-pip { background: var(--seafoam); }
    .zone-horizon   .zone-pip { background: var(--horizon-col); }
    .zone-beyond    .zone-pip { background: var(--beyond-col); }

    .zone-crossed  .zone-label em { color: var(--gold); }
    .zone-inmotion .zone-label em { color: var(--seafoam); }
    .zone-horizon  .zone-label em { color: var(--horizon-col); }
    .zone-beyond   .zone-label em { color: var(--beyond-col); }

    /* ── PATH (stones) ── */
    .path {
      position: relative;
    }
    .path::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--mid) 8%, var(--mid) 92%, transparent);
      transform: translateX(-50%);
    }

    .stone-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 40px;
      position: relative;
    }
    .stone-row:nth-child(odd)  { flex-direction: row; }
    .stone-row:nth-child(even) { flex-direction: row-reverse; }

    /* centre dot */
    .stone-row::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 22px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--mid);
      transform: translateX(-50%);
      z-index: 1;
    }
    .stone-row.is-done::before { background: var(--gold); }

    .stone-circle {
      flex: 0 0 44px;
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      z-index: 2;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .stone-row:hover .stone-circle { transform: scale(1.08); }

    /* crossed */
    .zone-crossed .stone-circle {
      background: var(--gold-glow);
      border: 1.5px solid var(--gold);
      color: var(--gold);
      box-shadow: 0 0 0 7px rgba(201,169,110,0.06), 0 0 20px rgba(201,169,110,0.1);
    }
    /* in motion */
    .zone-inmotion .stone-circle {
      background: rgba(123,191,181,0.08);
      border: 1.5px solid var(--seafoam);
      color: var(--seafoam);
    }
    /* horizon */
    .zone-horizon .stone-circle {
      background: rgba(168,156,200,0.08);
      border: 1.5px dashed var(--horizon-col);
      color: var(--horizon-col);
      opacity: 0.7;
    }
    /* across the horizon */
    .zone-beyond .stone-circle {
      background: rgba(232,160,160,0.06);
      border: 1.5px dashed var(--beyond-col);
      color: var(--beyond-col);
      opacity: 0.5;
    }

    .stone-body {
      flex: 1;
      padding: 4px 16px;
    }
    .stone-row:nth-child(odd)  .stone-body { text-align: left; }
    .stone-row:nth-child(even) .stone-body { text-align: right; }

    .stone-date {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .stone-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.3;
      margin-bottom: 5px;
      color: var(--text);
    }
    .stone-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      font-style: italic;
    }
    .stone-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 9px;
      border-radius: 20px;
      margin-top: 7px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--mid);
    }

    /* ── DIVIDERS BETWEEN ZONES ── */
    .zone-divider {
      text-align: center;
      margin: 16px 0 56px;
      position: relative;
    }
    .zone-divider::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: var(--mid);
    }
    .zone-divider span {
      position: relative;
      background: var(--bg);
      padding: 0 16px;
      font-size: 18px;
      color: var(--mid);
    }

    /* ── EMPTY STATE ── */
    .zone-empty {
      text-align: center;
      padding: 32px;
      font-size: 13px;
      color: var(--mid);
      font-style: italic;
      border: 1px dashed var(--mid);
      border-radius: 8px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .path::before { left: 26px; }
      .stone-row,
      .stone-row:nth-child(even) { flex-direction: row !important; }
      .stone-row::before { left: 26px; }
      .stone-body,
      .stone-row:nth-child(even) .stone-body { text-align: left !important; }
    }
    @media (prefers-reduced-motion: reduce) {
      .stone-circle { transition: none; }
      .spinner { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Durim Morina</p>
  <h1>The <em>camino</em></h1>
  <p>Every stone crossed is real. Every stone ahead is already yours.</p>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="zones" id="zones">
  <div class="loading">Loading your path...</div>
</div>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQD5D0vdAu6Ka9qWJ-ErcGzcBb-5_HL6asF48cTPTTMcDAcLu2bs3vebiYGdDfDGTt0iylV9B6N6_4i/pub?output=csv";

const ZONES = [
  {
    key: "crossed",
    cssClass: "zone-crossed",
    label: "Stones <em>crossed</em>",
    divider: null,
    emptyText: "Your proof wall is waiting. Add your first crossed stone."
  },
  {
    key: "in motion",
    cssClass: "zone-inmotion",
    label: "In <em>motion</em>",
    divider: "◦",
    emptyText: "What are you actively working on right now?"
  },
  {
    key: "horizon",
    cssClass: "zone-horizon",
    label: "The <em>horizon</em>",
    divider: "◦",
    emptyText: "Name a future stone. Make it real enough to walk toward."
  },
  {
    key: "across the horizon",
    cssClass: "zone-beyond",
    label: "<em>Across</em> the horizon",
    divider: "✦",
    emptyText: "The wildest, furthest vision. What do you dare to want?"
  }
];

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/"/g, ""));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = "", inQ = false;
    for (let ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || "").trim());
    return obj;
  }).filter(r => r.title);
}

function stoneHTML(row, zoneClass) {
  const isDone = row.done && row.done.toLowerCase() === 'true';
  const initial = row.category ? row.category.charAt(0).toUpperCase() : '·';
  return `
    <div class="stone-row ${isDone ? 'is-done' : ''}">
      <div class="stone-circle">${initial}</div>
      <div class="stone-body">
        ${row.date ? `<div class="stone-date">${row.date}</div>` : ''}
        <div class="stone-title">${row.title}</div>
        ${row.note ? `<div class="stone-note">${row.note}</div>` : ''}
        ${row.category ? `<span class="stone-tag">${row.category}</span>` : ''}
      </div>
    </div>
  `;
}

function renderStats(rows) {
  const crossed = rows.filter(r => (r.zone || '').toLowerCase() === 'crossed').length;
  const inMotion = rows.filter(r => (r.zone || '').toLowerCase() === 'in motion').length;
  const ahead = rows.filter(r => {
    const z = (r.zone || '').toLowerCase();
    return z === 'horizon' || z === 'across the horizon';
  }).length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-n">${crossed}</div><div class="stat-l">crossed</div></div>
    <div class="stat"><div class="stat-n">${inMotion}</div><div class="stat-l">in motion</div></div>
    <div class="stat"><div class="stat-n">${ahead}</div><div class="stat-l">ahead</div></div>
  `;
}

function renderZones(rows) {
  const zonesEl = document.getElementById('zones');
  zonesEl.innerHTML = '';

  ZONES.forEach(zone => {
    const zRows = rows.filter(r => (r.zone || '').toLowerCase() === zone.key);

    if (zone.divider) {
      const div = document.createElement('div');
      div.className = 'zone-divider';
      div.innerHTML = `<span>${zone.divider}</span>`;
      zonesEl.appendChild(div);
    }

    const block = document.createElement('div');
    block.className = `zone-block ${zone.cssClass}`;

    const doneCount = zRows.filter(r => r.done && r.done.toLowerCase() === 'true').length;

    block.innerHTML = `
      <div class="zone-header">
        <div class="zone-pip"></div>
        <div class="zone-label">${zone.label}</div>
        <div class="zone-count">${zRows.length} stone${zRows.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="path">
        ${zRows.length === 0
          ? `<div class="zone-empty">${zone.emptyText}</div>`
          : zRows.map(r => stoneHTML(r, zone.cssClass)).join('')
        }
      </div>
    `;

    zonesEl.appendChild(block);
  });
}

async function load() {
  try {
    const res = await fetch(SHEET_CSV);
    if (!res.ok) throw new Error('Could not reach your sheet.');
    const text = await res.text();
    const rows = parseCSV(text);
    renderStats(rows);
    renderZones(rows);
  } catch (err) {
    document.getElementById('stats-bar').innerHTML = '';
    document.getElementById('zones').innerHTML = `
      <div class="loading">
        Could not load your milestones.<br><br>
        <small>${err.message}<br><br>
        Make sure your Google Sheet is published to the web as CSV.</small>
      </div>`;
  }
}

load();
</script>
</body>
</html>
